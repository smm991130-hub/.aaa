<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="AI Calorie Tracker Pro - History">
  <meta name="theme-color" content="#6366f1">
  <title>History - AI Calorie Tracker Pro</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <h1 class="header-title" data-i18n="history.title">History</h1>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="exportHistory()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Period Selector -->
    <section class="section">
      <div class="period-selector">
        <button class="period-btn active" data-period="daily" onclick="selectPeriod('daily')" data-i18n="history.daily">Daily</button>
        <button class="period-btn" data-period="weekly" onclick="selectPeriod('weekly')" data-i18n="history.weekly">Weekly</button>
        <button class="period-btn" data-period="monthly" onclick="selectPeriod('monthly')" data-i18n="history.monthly">Monthly</button>
      </div>
    </section>

    <!-- Calendar View -->
    <section class="section">
      <div class="glass-card animate-slide-up">
        <div class="calendar-header">
          <button class="btn btn-ghost" onclick="prevMonth()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <h3 id="currentMonth">January 2024</h3>
          <button class="btn btn-ghost" onclick="nextMonth()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
        </div>
        <div class="calendar-grid" id="calendarGrid">
          <!-- Calendar days will be generated by JavaScript -->
        </div>
      </div>
    </section>

    <!-- Statistics Summary -->
    <section class="section">
      <div class="grid-2">
        <div class="stat-card animate-slide-up stagger-1">
          <span class="stat-label" data-i18n="history.calories">Average Calories</span>
          <span class="stat-value" id="avgCalories">0</span>
        </div>
        <div class="stat-card animate-slide-up stagger-2">
          <span class="stat-label" data-i18n="dashboard.weight">Average Weight</span>
          <span class="stat-value" id="avgWeight">0 kg</span>
        </div>
      </div>
    </section>

    <!-- History Chart -->
    <section class="section">
      <div class="glass-card animate-slide-up stagger-3">
        <h3 data-i18n="statistics.calories">Calories Over Time</h3>
        <canvas id="historyChart" height="200"></canvas>
      </div>
    </section>

    <!-- History List -->
    <section class="section">
      <h2 class="section-title" data-i18n="history.title">Food History</h2>
      <div id="historyList" class="history-list">
        <div class="empty-state">
          <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
          </svg>
          <p class="empty-state-text" data-i18n="history.no_data">No history data available</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <button class="navbar-item" onclick="navigate('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span data-i18n="dashboard.title">Dashboard</span>
    </button>
    <button class="navbar-item active" onclick="navigate('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 8v4l3 3m6-3a9 9 0 0 1-18 0 9 9 0 0 1 18 0z"/>
      </svg>
      <span data-i18n="history.title">History</span>
    </button>
    <button class="navbar-item" onclick="navigate('statistics')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span data-i18n="statistics.title">Statistics</span>
    </button>
    <button class="navbar-item" onclick="navigate('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span data-i18n="settings.title">Settings</span>
    </button>
  </nav>

  <!-- JavaScript -->
  <script src="js/language.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
  <script>
    let currentDate = new Date();
    let selectedPeriod = 'daily';
    let historyChart = null;

    function selectPeriod(period) {
      selectedPeriod = period;
      document.querySelectorAll('.period-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector(`[data-period="${period}"]`).classList.add('active');
      loadHistory();
    }

    function prevMonth() {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    }

    function nextMonth() {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      
      document.getElementById('currentMonth').textContent = 
        new Date(year, month).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      
      const calendarGrid = document.getElementById('calendarGrid');
      calendarGrid.innerHTML = '';
      
      // Day headers
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      days.forEach(day => {
        const dayEl = document.createElement('div');
        dayEl.className = 'calendar-day-header';
        dayEl.textContent = day;
        calendarGrid.appendChild(dayEl);
      });
      
      // Empty cells before first day
      for (let i = 0; i < firstDay; i++) {
        const emptyEl = document.createElement('div');
        emptyEl.className = 'calendar-day empty';
        calendarGrid.appendChild(emptyEl);
      }
      
      // Days
      const historyData = JSON.parse(localStorage.getItem('foodHistory') || '[]');
      for (let day = 1; day <= daysInMonth; day++) {
        const dayEl = document.createElement('div');
        dayEl.className = 'calendar-day';
        dayEl.textContent = day;
        
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dayData = historyData.filter(item => item.date.startsWith(dateStr));
        
        if (dayData.length > 0) {
          dayEl.classList.add('has-data');
          const totalCalories = dayData.reduce((sum, item) => sum + item.calories, 0);
          dayEl.setAttribute('data-calories', totalCalories);
          dayEl.onclick = () => showDayDetails(dateStr);
        }
        
        calendarGrid.appendChild(dayEl);
      }
    }

    function showDayDetails(dateStr) {
      const historyData = JSON.parse(localStorage.getItem('foodHistory') || '[]');
      const dayData = historyData.filter(item => item.date.startsWith(dateStr));
      
      if (dayData.length > 0) {
        alert(`Date: ${dateStr}\nTotal Calories: ${dayData.reduce((sum, item) => sum + item.calories, 0)}\nMeals: ${dayData.length}`);
      }
    }

    function loadHistory() {
      const historyData = JSON.parse(localStorage.getItem('foodHistory') || '[]');
      const historyList = document.getElementById('historyList');
      
      if (historyData.length === 0) {
        historyList.innerHTML = `
          <div class="empty-state">
            <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
            </svg>
            <p class="empty-state-text" data-i18n="history.no_data">No history data available</p>
          </div>
        `;
        return;
      }
      
      // Sort by date descending
      historyData.sort((a, b) => new Date(b.date) - new Date(a.date));
      
      // Group by date
      const grouped = {};
      historyData.forEach(item => {
        const date = item.date.split('T')[0];
        if (!grouped[date]) {
          grouped[date] = [];
        }
        grouped[date].push(item);
      });
      
      let html = '';
      Object.keys(grouped).forEach(date => {
        const items = grouped[date];
        const totalCalories = items.reduce((sum, item) => sum + item.calories, 0);
        
        html += `
          <div class="history-day">
            <div class="history-day-header">
              <span class="history-date">${new Date(date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</span>
              <span class="history-calories">${totalCalories} kcal</span>
            </div>
            <div class="history-meals">
        `;
        
        items.forEach(item => {
          html += `
            <div class="history-meal-item">
              <span class="meal-name">${item.name}</span>
              <span class="meal-calories">${item.calories} kcal</span>
            </div>
          `;
        });
        
        html += `
            </div>
          </div>
        `;
      });
      
      historyList.innerHTML = html;
      
      // Calculate averages
      calculateStatistics(historyData);
      
      // Render chart
      renderHistoryChart(historyData);
    }

    function calculateStatistics(historyData) {
      if (historyData.length === 0) return;
      
      // Group by date for averages
      const grouped = {};
      historyData.forEach(item => {
        const date = item.date.split('T')[0];
        if (!grouped[date]) {
          grouped[date] = { calories: 0, weight: item.weight || 0, count: 0 };
        }
        grouped[date].calories += item.calories;
        if (item.weight) {
          grouped[date].weight = item.weight;
        }
        grouped[date].count++;
      });
      
      const days = Object.keys(grouped).length;
      const totalCalories = Object.values(grouped).reduce((sum, day) => sum + day.calories, 0);
      const totalWeight = Object.values(grouped).reduce((sum, day) => sum + day.weight, 0);
      
      document.getElementById('avgCalories').textContent = Math.round(totalCalories / days);
      document.getElementById('avgWeight').textContent = days > 0 ? (totalWeight / days).toFixed(1) + ' kg' : '0 kg';
    }

    function renderHistoryChart(historyData) {
      const ctx = document.getElementById('historyChart').getContext('2d');
      
      // Group by date
      const grouped = {};
      historyData.forEach(item => {
        const date = item.date.split('T')[0];
        if (!grouped[date]) {
          grouped[date] = 0;
        }
        grouped[date] += item.calories;
      });
      
      const labels = Object.keys(grouped).sort().slice(-7);
      const data = labels.map(date => grouped[date]);
      
      if (historyChart) {
        historyChart.destroy();
      }
      
      historyChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels.map(date => new Date(date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })),
          datasets: [{
            label: 'Calories',
            data: data,
            borderColor: '#6366f1',
            backgroundColor: 'rgba(99, 102, 241, 0.1)',
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            }
          },
          scales: {
            y: {
              beginAtZero: true
            }
          }
        }
      });
    }

    function exportHistory() {
      const historyData = JSON.parse(localStorage.getItem('foodHistory') || '[]');
      const csv = 'Date,Food Name,Calories,Protein,Carbs,Fats\n' + 
        historyData.map(item => 
          `${item.date},"${item.name}",${item.calories},${item.protein || 0},${item.carbs || 0},${item.fats || 0}`
        ).join('\n');
      
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'calorie_history.csv';
      a.click();
      window.URL.revokeObjectURL(url);
      
      showToast('History exported successfully', 'success');
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type} active`;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.classList.remove('active');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
      renderCalendar();
      loadHistory();
    });
  </script>

  <style>
    .period-selector {
      display: flex;
      gap: 8px;
      background: var(--bg-tertiary);
      padding: 4px;
      border-radius: var(--radius-md);
    }

    .period-btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    .period-btn.active {
      background: var(--bg-secondary);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .calendar-header h3 {
      margin: 0;
      font-size: 1.125rem;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .calendar-day-header {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      padding: 8px 4px;
    }

    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.875rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .calendar-day:hover {
      background: var(--bg-tertiary);
    }

    .calendar-day.empty {
      cursor: default;
    }

    .calendar-day.has-data {
      background: var(--primary);
      color: white;
      font-weight: 600;
    }

    .calendar-day.has-data:hover {
      background: var(--primary-dark);
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .history-day {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 16px;
      box-shadow: var(--shadow-sm);
    }

    .history-day-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--glass-border);
    }

    .history-date {
      font-weight: 600;
      color: var(--text-primary);
    }

    .history-calories {
      font-weight: 700;
      color: var(--primary);
    }

    .history-meals {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-meal-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }

    .history-meal-item .meal-name {
      font-size: 0.875rem;
      color: var(--text-primary);
    }

    .history-meal-item .meal-calories {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
  </style>
</body>
</html>
